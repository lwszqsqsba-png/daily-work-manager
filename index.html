<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日常作业管理</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(31, 42, 61, 0.12);
      --text: #1f2a3d;
      --muted: #6b758b;
      --primary: #4567f7;
      --primary-soft: rgba(69, 103, 247, 0.12);
      --success: #1fa97c;
      --success-soft: rgba(31, 169, 124, 0.12);
      --warning: #ff9d2f;
      --warning-soft: rgba(255, 157, 47, 0.15);
      --danger: #ef5b5b;
      --danger-soft: rgba(239, 91, 91, 0.12);
      --shadow: 0 18px 40px rgba(31, 42, 61, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --font-ui: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(69, 103, 247, 0.13), transparent 28%),
        radial-gradient(circle at top right, rgba(31, 169, 124, 0.09), transparent 22%),
        linear-gradient(180deg, #f8fafc 0%, #eef2f8 100%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 100vh;
      transition: grid-template-columns 0.25s ease;
    }

    .shell.panel-collapsed {
      grid-template-columns: minmax(0, 1fr) 0;
    }

    .workspace {
      padding: 18px 38px 42px;
      overflow: auto;
    }

    .side-panel {
      padding: 28px 24px;
      border-left: 1px solid rgba(31, 42, 61, 0.08);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(247, 250, 255, 0.94));
      backdrop-filter: blur(18px);
      overflow: auto;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .shell.panel-collapsed .side-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateX(24px);
    }

    .open-panel-button {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 10;
      display: none;
      padding: 12px 16px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(90deg, #4567f7, #2f54eb);
      box-shadow: 0 16px 30px rgba(69, 103, 247, 0.26);
      cursor: pointer;
    }

    .shell.panel-collapsed + .open-panel-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .hero {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      animation: rise 0.5s ease both;
    }

    .brand-logo {
      width: 54px;
      height: 60px;
      margin: 0;
      display: block;
      object-fit: contain;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      color: var(--primary);
      background: rgba(69, 103, 247, 0.08);
      font-size: 13px;
      font-weight: 700;
    }

    .hero h1 {
      margin: 0;
      color: var(--primary);
      font-size: 40px;
      line-height: 1.15;
    }

    .hero p {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 13px;
    }

    .insight-grid,
    .member-grid {
      display: grid;
      gap: 16px;
    }

    .insight-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .member-grid {
      grid-template-columns: repeat(var(--member-columns, 3), minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .panel,
    .member-card,
    .mode-card,
    .profile-card,
    .empty-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel,
    .member-card {
      animation: rise 0.6s ease both;
    }

    .metric-top,
    .panel-header,
    .section-header,
    .side-top,
    .member-head,
    .profile-head,
    .range-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .metric-note,
    .panel-subtitle,
    .side-note,
    .table-caption,
    .empty-card p,
    .profile-meta,
    .detail-note,
    .member-role,
    .member-meta,
    .task-main span,
    .focus-main span,
    .stat-item span,
    .field label,
    .range-row span,
    .hint-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .tiny-bar,
    .progress-track {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.18);
    }

    .tiny-bar {
      margin-top: 16px;
    }

    .tiny-bar > span,
    .progress-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .panel {
      padding: 20px;
    }

    .panel h2,
    .section-header h2,
    .side-panel h2 {
      margin: 0;
      font-size: 22px;
    }

    .panel h3,
    .section-header h3,
    .profile-card h3 {
      margin: 0;
      font-size: 18px;
    }

    .section-header {
      margin: 16px 0 10px;
    }

    .section-header h2 {
      font-size: 18px;
    }

    .board-column-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .board-column-select {
      padding: 7px 12px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 999px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.24);
      font-size: 14px;
      color: var(--muted);
    }

    .tabs span.active {
      position: relative;
      color: var(--text);
      font-weight: 700;
    }

    .tabs span.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -11px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
    }

    .task-list,
    .focus-list,
    .stat-grid,
    .detail-list {
      display: grid;
      gap: 12px;
    }

    .task-row,
    .focus-item,
    .detail-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: rgba(248, 250, 252, 0.94);
    }

    .focus-item,
    .detail-item {
      grid-template-columns: auto 1fr;
    }

    .focus-item.warning {
      background: linear-gradient(90deg, rgba(255, 157, 47, 0.12), rgba(255, 157, 47, 0.02));
    }

    .focus-item.success {
      background: linear-gradient(90deg, rgba(31, 169, 124, 0.1), rgba(31, 169, 124, 0.02));
    }

    .task-dot,
    .focus-icon,
    .avatar,
    .mode-icon {
      display: grid;
      place-items: center;
      border-radius: 14px;
      font-weight: 700;
    }

    .task-dot,
    .focus-icon,
    .mode-icon {
      width: 36px;
      height: 36px;
      color: var(--primary);
      background: var(--primary-soft);
      font-size: 14px;
    }

    .focus-icon.success {
      color: var(--success);
      background: var(--success-soft);
    }

    .task-main strong,
    .focus-main strong,
    .detail-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .status-pill,
    .priority-pill,
    .mode-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-todo,
    .priority-medium {
      color: #7a5f00;
      background: rgba(255, 201, 87, 0.18);
    }

    .status-doing,
    .priority-high {
      color: var(--primary);
      background: var(--primary-soft);
    }

    .status-delayed,
    .priority-urgent {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .status-done,
    .priority-low {
      color: var(--success);
      background: var(--success-soft);
    }

    .stat-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 24px;
      line-height: 1;
    }

    .stat-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(248, 250, 252, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .member-card {
      padding: 18px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .member-card:hover,
    .mode-card:hover,
    .action-button:hover,
    .ghost-button:hover,
    .primary-button:hover,
    .danger-button:hover {
      transform: translateY(-2px);
    }

    .member-card.selected {
      border-color: rgba(69, 103, 247, 0.35);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(239, 244, 255, 0.98));
    }

    .avatar {
      width: 46px;
      height: 46px;
      color: var(--primary);
      background: rgba(69, 103, 247, 0.12);
      font-size: 16px;
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .member-name {
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .member-highlight {
      margin: 12px 0 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .member-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .member-task-list {
      min-height: 220px;
      margin: 14px 0 4px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    .member-task-add,
    .member-task-row {
      width: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: background 0.16s ease;
    }

    .member-task-row {
      border-radius: 0;
    }

    .member-task-add {
      color: #9aa3b2;
      font-size: 13px;
    }

    .member-task-row:hover,
    .member-task-row.is-selected,
    .member-task-add:hover {
      background: rgba(31, 42, 61, 0.04);
    }

    .task-circle {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
      border: 2px solid #a4abb4;
      border-radius: 50%;
    }

    .task-plus {
      width: 17px;
      flex: 0 0 auto;
      color: #9aa3b2;
      font-size: 24px;
      line-height: 1;
      text-align: center;
    }

    .member-task-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      color: #2b3446;
      font-size: 14px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .member-task-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .mini-task-select,
    .table-task-select {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 999px;
      background: rgba(69, 103, 247, 0.06);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    .mini-task-select {
      max-width: 58px;
      padding: 3px 6px;
    }

    .table-task-select {
      min-width: 78px;
      padding: 6px 8px;
    }

    .check-task-button {
      min-width: 68px;
      padding: 7px 10px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(90deg, #4567f7, #2f54eb);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .priority-select-urgent {
      color: #ef5b5b;
      background: rgba(239, 91, 91, 0.1);
    }

    .priority-select-high {
      color: #e27800;
      background: rgba(255, 157, 47, 0.14);
    }

    .priority-select-medium {
      color: #4567f7;
      background: rgba(69, 103, 247, 0.08);
    }

    .priority-select-low {
      color: #1fa97c;
      background: rgba(31, 169, 124, 0.1);
    }

    .task-filter-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 16px 0 14px;
    }

    .task-filter-toolbar .filter-row {
      margin: 0;
    }

    .employee-filter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .employee-filter-select {
      min-width: 150px;
      padding: 8px 12px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 999px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .member-task-row.is-done .task-circle {
      border-color: var(--success);
      background: radial-gradient(circle, var(--success) 42%, transparent 45%);
    }

    .member-task-row.is-done .member-task-title {
      color: #8d98a9;
      text-decoration: line-through;
    }

    .empty-card {
      padding: 26px;
      text-align: center;
    }

    .empty-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 14px;
    }

    .filter-chip {
      padding: 8px 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 999px;
      color: var(--muted);
      background: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-chip.active {
      color: var(--primary);
      border-color: rgba(69, 103, 247, 0.2);
      background: rgba(69, 103, 247, 0.08);
    }

    .task-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .task-table th,
    .task-table td {
      padding: 14px 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      text-align: left;
      vertical-align: middle;
    }

    .task-table th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .task-table th:nth-child(1),
    .task-table td:nth-child(1) {
      width: 120px;
    }

    .task-table th:nth-child(2),
    .task-table td:nth-child(2) {
      width: 220px;
      max-width: 220px;
    }

    .task-table td:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-table tbody tr {
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .task-table tbody tr:hover {
      background: rgba(69, 103, 247, 0.04);
    }

    .task-table tbody tr.selected-row {
      background: rgba(69, 103, 247, 0.07);
    }

    .editable-date {
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
    }

    .editable-date:hover {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .table-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 160px;
    }

    .table-progress .progress-track {
      flex: 1;
    }

    .close-button,
    .ghost-button,
    .action-button,
    .primary-button,
    .danger-button {
      border: 0;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .close-button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: var(--muted);
      background: rgba(148, 163, 184, 0.14);
      font-size: 20px;
      line-height: 1;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0 22px;
    }

    .mode-card {
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .mode-card.selected {
      border-color: rgba(69, 103, 247, 0.42);
      background: rgba(69, 103, 247, 0.06);
    }

    .mode-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .mode-tag {
      min-width: auto;
      padding: 4px 8px;
      color: var(--primary);
      background: rgba(69, 103, 247, 0.08);
    }

    .profile-card,
    .form-card {
      padding: 18px;
      margin-bottom: 16px;
    }

    .profile-card {
      display: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(243, 247, 255, 0.96));
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .profile-stats strong {
      display: block;
      margin-bottom: 4px;
      font-size: 24px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.96);
      resize: vertical;
    }

    .report-preview {
      width: 100%;
      min-height: 210px;
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.98);
      line-height: 1.65;
    }

    .report-head {
      margin-bottom: 10px;
    }

    .report-head strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    .button-row,
    .split-actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .split-actions {
      grid-template-columns: 1fr 1fr;
    }

    .primary-button,
    .danger-button,
    .ghost-button,
    .action-button {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      font-weight: 700;
    }

    .primary-button {
      color: #fff;
      background: linear-gradient(90deg, #4567f7, #2f54eb);
      box-shadow: 0 14px 28px rgba(69, 103, 247, 0.24);
    }

    .danger-button {
      color: var(--danger);
      background: rgba(239, 91, 91, 0.1);
    }

    .ghost-button {
      color: var(--text);
      background: rgba(148, 163, 184, 0.12);
    }

    .import-file-input {
      display: none;
    }

    .action-button {
      color: #fff;
      background: linear-gradient(90deg, #6a7ffb, #4567f7);
    }

    .side-panel {
      font-size: 13px;
    }

    .side-panel .side-top {
      margin-bottom: 12px;
    }

    .side-panel h2 {
      font-size: 18px;
    }

    .side-panel .side-note,
    .side-panel .panel-subtitle,
    .side-panel .field label,
    .side-panel .range-row span,
    .side-panel .hint-text,
    .side-panel .profile-meta,
    .side-panel .detail-note {
      font-size: 11px;
      line-height: 1.45;
    }

    .side-panel .panel,
    .side-panel .profile-card,
    .side-panel .form-card {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 16px;
    }

    .side-panel .profile-card {
      display: none;
    }

    .side-panel .panel-header {
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .side-panel .panel h3,
    .side-panel .profile-card h3 {
      font-size: 14px;
    }

    .side-panel .stat-grid,
    .side-panel .detail-list {
      gap: 8px;
    }

    .side-panel .stat-item {
      padding: 8px 9px;
      border-radius: 12px;
    }

    .side-panel .stat-item strong,
    .side-panel .profile-stats strong {
      margin-bottom: 2px;
      font-size: 18px;
    }

    .side-panel .profile-head,
    .side-panel .member-info,
    .side-panel .range-row {
      gap: 8px;
    }

    .side-panel .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      font-size: 14px;
    }

    .side-panel .member-name,
    .side-panel .detail-item strong,
    .side-panel .report-head strong {
      font-size: 13px;
    }

    .side-panel .status-pill,
    .side-panel .priority-pill {
      min-width: 56px;
      padding: 4px 8px;
      font-size: 11px;
    }

    .side-panel .profile-stats {
      gap: 8px;
      margin: 10px 0;
    }

    .side-panel .detail-item {
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
    }

    .side-panel .focus-icon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      font-size: 12px;
    }

    .side-panel .field {
      gap: 5px;
      margin-bottom: 8px;
    }

    .side-panel .field input,
    .side-panel .field select,
    .side-panel .field textarea {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    .side-panel .button-row,
    .side-panel .split-actions {
      gap: 8px;
      margin-top: 9px;
    }

    .side-panel .primary-button,
    .side-panel .danger-button,
    .side-panel .ghost-button,
    .side-panel .action-button {
      padding: 9px 10px;
      border-radius: 11px;
      font-size: 12px;
    }

    .side-panel .report-preview {
      min-height: 120px;
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.5;
    }

    .side-panel .report-head {
      margin-bottom: 7px;
    }

    .toast {
      position: fixed;
      right: 28px;
      bottom: 24px;
      z-index: 20;
      padding: 12px 16px;
      border-radius: 14px;
      color: #fff;
      background: rgba(31, 42, 61, 0.94);
      box-shadow: 0 18px 40px rgba(31, 42, 61, 0.18);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(31, 42, 61, 0.28);
      backdrop-filter: blur(6px);
    }

    .task-dialog {
      width: min(460px, 100%);
      padding: 20px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 24px 58px rgba(31, 42, 61, 0.2);
    }

    .task-dialog-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .task-dialog-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .task-dialog-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .dialog-close {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      color: var(--muted);
      background: rgba(148, 163, 184, 0.14);
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1280px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1080px) {
      .shell,
      .shell.panel-collapsed {
        grid-template-columns: 1fr;
      }

      .side-panel {
        border-left: 0;
        border-top: 1px solid rgba(31, 42, 61, 0.08);
      }

      .shell.panel-collapsed .side-panel {
        display: none;
      }
    }

    @media (max-width: 860px) {
      .workspace {
        padding: 24px 18px 30px;
      }

      .insight-grid,
      .member-grid,
      .mode-grid,
      .split-actions {
        grid-template-columns: 1fr;
      }

      .task-table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }

      .panel h2,
      .side-panel h2 {
        font-size: 24px;
      }

      .hero h1 {
        font-size: 34px;
      }

      .brand-logo {
        width: 44px;
        height: 50px;
      }

      .section-header h2 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <main class="workspace">
      <section class="hero">
        <img class="brand-logo" src="assets/langyun-logo-icon.png" alt="朗云物联logo">
        <h1>日常作业分工与进度管理</h1>
      </section>

      <section class="insight-grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h3>团队概览</h3>
              <p class="panel-subtitle">快速掌握任务状态分布。</p>
            </div>
          </div>
          <div class="stat-grid" id="statsGrid"></div>
        </article>
      </section>

      <div class="section-header">
        <div>
          <h2>员工看板</h2>
        </div>
        <label class="board-column-control" for="memberColumnSelect">
          每行
          <select class="board-column-select" id="memberColumnSelect">
            <option value="1">1列</option>
            <option value="2">2列</option>
            <option value="3">3列</option>
            <option value="4">4列</option>
          </select>

      </div>
      <section id="memberSection"></section>

      <article class="panel">
        <div class="panel-header">
          <div>
            <h3>任务清单</h3>
            <p class="table-caption" id="tableCaption"></p>
          </div>
        </div>
        <div class="task-filter-toolbar">
          <div class="filter-row" id="filterRow"></div>
          <label class="employee-filter" for="employeeFilter">
            员工筛选
            <select class="employee-filter-select" id="employeeFilter"></select>
          </label>
        </div>
        <div id="taskTableWrap"></div>
      </article>
    </main>

    <aside class="side-panel" id="sidePanel">
      <div class="side-top">
        <div>
          <h2>管理面板</h2>
          <p class="side-note">可在这里查看概况、新增员工、更新进度和导出报表。</p>
        </div>
        <button class="close-button" id="togglePanelButton" type="button" aria-label="收起右侧面板">×</button>
      </div>

      <section class="profile-card" id="profileCard"></section>

      <section class="panel form-card">
        <div class="panel-header">
          <div>
            <h3>新增/删减员工</h3>
            <p class="panel-subtitle">可新增员工，也可选择员工后删除其资料和任务。</p>
          </div>
        </div>
        <form id="memberForm">
          <div class="field">
            <label for="memberName">员工姓名</label>
            <input id="memberName" name="memberName" type="text" placeholder="例如：张三" required>
          </div>
          <div class="field">
            <label for="memberRole">岗位/职责</label>
            <input id="memberRole" name="memberRole" type="text" placeholder="例如：前端开发 / 测试 / 采购">
          </div>
          <div class="field">
            <label for="memberNote">备注</label>
            <textarea id="memberNote" name="memberNote" rows="2" placeholder="可记录当前负责方向或说明"></textarea>
          </div>
          <button class="primary-button" type="submit">添加员工</button>
        </form>
        <div class="field">
          <label for="deleteMemberSelect">删除员工</label>
          <select id="deleteMemberSelect"></select>
        </div>
        <button class="danger-button" id="deleteMemberButton" type="button">删除选中员工</button>
      </section>

      <section class="panel form-card">
        <div class="panel-header">
          <div>
            <h3>数据备份 / 恢复</h3>
            <p class="panel-subtitle">新增员工和任务默认保存在浏览器本地，清缓存前请先导出备份。</p>
          </div>
        </div>
        <div class="split-actions">
          <button class="primary-button" id="exportDataButton" type="button">导出数据备份</button>
          <button class="ghost-button" id="importDataButton" type="button">导入数据恢复</button>
        </div>
        <input class="import-file-input" id="importDataInput" type="file" accept="application/json,.json">
      </section>

      <section class="panel form-card">
        <div class="panel-header">
          <div>
            <h3>日报 / 周报导出</h3>
            <p class="panel-subtitle">按当前选中员工生成汇报内容，也可以打印团队完成情况。</p>
          </div>
        </div>
        <div class="split-actions">
          <button class="action-button" id="exportDailyButton" type="button">生成日报</button>
          <button class="action-button" id="exportWeeklyButton" type="button">生成周报</button>
        </div>
        <div class="report-head">
          <strong id="reportTitle">未生成报表</strong>
          <span class="hint-text">生成后可复制、下载，或继续修改内容。</span>
        </div>
        <textarea class="report-preview" id="reportPreview" placeholder="这里会显示选中员工的日报或周报内容。"></textarea>
        <div class="button-row">
          <button class="ghost-button" id="copyReportButton" type="button">复制报表内容</button>
          <button class="ghost-button" id="downloadReportButton" type="button">下载 TXT</button>
          <button class="primary-button" id="printBoardButton" type="button">打印团队完成情况</button>
        </div>
      </section>
    </aside>
  </div>

  <button class="open-panel-button" id="openPanelButton" type="button">打开管理面板</button>
  <div class="modal-backdrop hidden" id="taskDialogBackdrop">
    <section class="task-dialog" role="dialog" aria-modal="true" aria-labelledby="taskDialogTitle">
      <div class="task-dialog-head">
        <div>
          <h3 id="taskDialogTitle">新增任务</h3>
          <p id="taskDialogAssignee">选择员工后创建任务</p>
        </div>
        <button class="dialog-close" id="closeTaskDialogButton" type="button" aria-label="关闭">×</button>
      </div>
      <form id="dialogTaskForm">
        <div class="field">
          <label for="dialogTaskName">任务名称</label>
          <input id="dialogTaskName" name="taskName" type="text" placeholder="例如：周三安排候选人面试" required>
        </div>
        <div class="field">
          <label for="dialogStartDate">开始时间</label>
          <input id="dialogStartDate" name="startDate" type="date" required>
        </div>
        <div class="field">
          <label for="dialogDueDate">截止日期</label>
          <input id="dialogDueDate" name="dueDate" type="date" required>
        </div>
        <div class="split-actions">
          <div class="field">
            <label for="dialogPriority">优先级</label>
            <select id="dialogPriority" name="priority">
              <option value="urgent">紧急</option>
              <option value="high">高</option>
              <option value="medium" selected>中</option>
              <option value="low">低</option>
            </select>
          </div>
          <div class="field">
            <label for="dialogTaskStatus">初始状态</label>
            <select id="dialogTaskStatus" name="taskStatus">
              <option value="todo" selected>待开始</option>
              <option value="doing">进行中</option>
              <option value="done">已完成</option>
              <option value="delayed">已延期</option>
            </select>
          </div>
        </div>
        <button class="primary-button" id="dialogSubmitButton" type="submit">创建任务</button>
      </form>
    </section>
  </div>
  <div class="modal-backdrop hidden" id="inspectDialogBackdrop">
    <section class="task-dialog" role="dialog" aria-modal="true" aria-labelledby="inspectDialogTitle">
      <div class="task-dialog-head">
        <div>
          <h3 id="inspectDialogTitle">任务检查</h3>
          <p id="inspectDialogTaskInfo">选择任务后更新检查结果</p>
        </div>
        <button class="dialog-close" id="closeInspectDialogButton" type="button" aria-label="关闭">×</button>
      </div>
      <div class="range-row">
        <span>当前完成度</span>
        <strong id="progressValue">0%</strong>
      </div>
      <input id="progressRange" type="range" min="0" max="100" step="5" value="0">
      <div class="split-actions">
        <div class="field">
          <label for="inspectStatus">状态</label>
          <select id="inspectStatus">
            <option value="todo">待开始</option>
            <option value="doing">进行中</option>
            <option value="done">已完成</option>
            <option value="delayed">已延期</option>
          </select>
        </div>
        <div class="field">
          <label for="inspectDate">检查日期</label>
          <input id="inspectDate" type="date">
        </div>
      </div>
      <div class="field">
        <label for="inspectNote">检查记录</label>
        <textarea id="inspectNote" rows="3" placeholder="例如：已完成初稿，等待主管确认"></textarea>
      </div>
      <div class="button-row">
        <button class="primary-button" id="saveProgressButton" type="button">保存检查结果</button>
        <button class="ghost-button" id="completeTaskButton" type="button">一键标记完成</button>
        <button class="danger-button" id="deleteTaskButton" type="button">删除当前任务</button>
      </div>
    </section>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "daily-work-manager-v2";
    const TODAY = new Date().toISOString().slice(0, 10);

    const statusMeta = {
      todo: { label: "待开始", className: "status-todo" },
      doing: { label: "进行中", className: "status-doing" },
      delayed: { label: "已延期", className: "status-delayed" },
      done: { label: "已完成", className: "status-done" }
    };

    const priorityMeta = {
      urgent: { label: "紧急", className: "priority-urgent" },
      high: { label: "高", className: "priority-high" },
      medium: { label: "中", className: "priority-medium" },
      low: { label: "低", className: "priority-low" }
    };

    const filterOptions = [
      { id: "all", label: "全部任务" },
      { id: "todo", label: "待开始" },
      { id: "doing", label: "进行中" },
      { id: "delayed", label: "已延期" },
      { id: "done", label: "已完成" }
    ];

    const defaultState = {
      activeFilter: "all",
      activeMemberFilter: "all",
      memberColumns: "3",
      selectedMemberId: null,
      selectedTaskId: null,
      reportTitle: "",
      reportText: "",
      members: [],
      tasks: []
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return { ...defaultState };
        }
        const parsed = JSON.parse(raw);
        return {
          ...defaultState,
          ...parsed,
          reportTitle: typeof parsed.reportTitle === "string" ? parsed.reportTitle : "",
          reportText: typeof parsed.reportText === "string" ? parsed.reportText : "",
          members: Array.isArray(parsed.members) ? parsed.members : [],
          tasks: Array.isArray(parsed.tasks) ? parsed.tasks : []
        };
      } catch (error) {
        return { ...defaultState };
      }
    }

    const state = loadState();

    const shell = document.getElementById("shell");
    const statsGrid = document.getElementById("statsGrid");
    const memberSection = document.getElementById("memberSection");
    const memberColumnSelect = document.getElementById("memberColumnSelect");
    const filterRow = document.getElementById("filterRow");
    const employeeFilter = document.getElementById("employeeFilter");
    const taskTableWrap = document.getElementById("taskTableWrap");
    const profileCard = document.getElementById("profileCard");
    const tableCaption = document.getElementById("tableCaption");

    const memberForm = document.getElementById("memberForm");
    const dialogTaskForm = document.getElementById("dialogTaskForm");
    const taskDialogBackdrop = document.getElementById("taskDialogBackdrop");
    const closeTaskDialogButton = document.getElementById("closeTaskDialogButton");
    const taskDialogAssignee = document.getElementById("taskDialogAssignee");
    const taskDialogTitle = document.getElementById("taskDialogTitle");
    const dialogSubmitButton = document.getElementById("dialogSubmitButton");
    const inspectDialogBackdrop = document.getElementById("inspectDialogBackdrop");
    const closeInspectDialogButton = document.getElementById("closeInspectDialogButton");
    const inspectDialogTaskInfo = document.getElementById("inspectDialogTaskInfo");
    const progressRange = document.getElementById("progressRange");
    const progressValue = document.getElementById("progressValue");
    const inspectStatus = document.getElementById("inspectStatus");
    const inspectDate = document.getElementById("inspectDate");
    const inspectNote = document.getElementById("inspectNote");
    const saveProgressButton = document.getElementById("saveProgressButton");
    const completeTaskButton = document.getElementById("completeTaskButton");
    const deleteTaskButton = document.getElementById("deleteTaskButton");
    const deleteMemberButton = document.getElementById("deleteMemberButton");
    const deleteMemberSelect = document.getElementById("deleteMemberSelect");
    const togglePanelButton = document.getElementById("togglePanelButton");
    const openPanelButton = document.getElementById("openPanelButton");
    const exportDataButton = document.getElementById("exportDataButton");
    const importDataButton = document.getElementById("importDataButton");
    const importDataInput = document.getElementById("importDataInput");
    const exportDailyButton = document.getElementById("exportDailyButton");
    const exportWeeklyButton = document.getElementById("exportWeeklyButton");
    const copyReportButton = document.getElementById("copyReportButton");
    const downloadReportButton = document.getElementById("downloadReportButton");
    const printBoardButton = document.getElementById("printBoardButton");
    const reportTitle = document.getElementById("reportTitle");
    const reportPreview = document.getElementById("reportPreview");
    const toast = document.getElementById("toast");

    inspectDate.value = TODAY;
    let dialogMemberId = null;
    let editingTaskId = null;
    let taskClickTimer = null;
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        activeFilter: state.activeFilter,
        activeMemberFilter: state.activeMemberFilter,
        memberColumns: state.memberColumns,
        selectedMemberId: state.selectedMemberId,
        selectedTaskId: state.selectedTaskId,
        reportTitle: state.reportTitle,
        reportText: state.reportText,
        members: state.members,
        tasks: state.tasks
      }));
    }

    function buildPersistedState() {
      return {
        version: 2,
        exportedAt: new Date().toISOString(),
        activeFilter: state.activeFilter,
        activeMemberFilter: state.activeMemberFilter,
        memberColumns: state.memberColumns,
        selectedMemberId: state.selectedMemberId,
        selectedTaskId: state.selectedTaskId,
        reportTitle: state.reportTitle,
        reportText: state.reportText,
        members: state.members,
        tasks: state.tasks
      };
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function formatStatusCount(tasks, status) {
      return tasks.filter((task) => task.status === status).length;
    }

    function getDateOffset(days) {
      const date = new Date(TODAY);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function normalizeTaskDates(task) {
      if (!task.start) {
        task.start = task.startDate || task.due || TODAY;
      }
      if (!task.due) {
        task.due = task.start || TODAY;
      }
      return task;
    }

    function sortTasks(tasks) {
      const priorityScore = { urgent: 0, high: 1, medium: 2, low: 3 };
      const statusScore = { delayed: 0, doing: 1, todo: 2, done: 3 };
      return [...tasks].map(normalizeTaskDates).sort((a, b) => {
        const dueCompare = new Date(a.due) - new Date(b.due);
        if (dueCompare !== 0) {
          return dueCompare;
        }
        const priorityCompare = priorityScore[a.priority] - priorityScore[b.priority];
        if (priorityCompare !== 0) {
          return priorityCompare;
        }
        return statusScore[a.status] - statusScore[b.status];
      });
    }

    function getMemberById(memberId) {
      return state.members.find((member) => member.id === memberId) || null;
    }

    function getTasksByMember(memberId) {
      return sortTasks(state.tasks.filter((task) => task.memberId === memberId));
    }

    function getSelectedMember() {
      if (!state.selectedMemberId) {
        return null;
      }
      return getMemberById(state.selectedMemberId);
    }

    function getSelectedTask() {
      if (!state.selectedTaskId) {
        return null;
      }
      return state.tasks.find((task) => task.id === state.selectedTaskId) || null;
    }

    function renderSelectOptions(meta, selectedValue) {
      return Object.entries(meta).map(([value, item]) => `
        <option value="${value}" ${value === selectedValue ? "selected" : ""}>${item.label}</option>
      `).join("");
    }

    function getPrioritySelectClass(priority) {
      return "priority-select-" + (priority || "medium");
    }

    function updateTaskField(taskId, field, value) {
      const task = state.tasks.find((item) => item.id === taskId);
      if (!task || !["title", "due", "priority", "status"].includes(field)) {
        return;
      }

      task[field] = typeof value === "string" ? value.trim() : value;
      if (field === "status") {
        if (task.status === "done") {
          task.progress = 100;
        } else if (task.status === "doing" && Number(task.progress || 0) === 0) {
          task.progress = 30;
        } else if (task.status === "todo" && task.progress === 100) {
          task.progress = 0;
        }
      }
      task.updatedAt = TODAY;
      state.selectedMemberId = task.memberId;
      state.selectedTaskId = task.id;
      updateMemberSnapshot(task.memberId);
      saveState();
      render();
    }

    function openDateEditor(cell) {
      if (cell.querySelector("input")) {
        return;
      }
      const task = state.tasks.find((item) => item.id === cell.dataset.taskId);
      const field = cell.dataset.dateField;
      if (!task || !["start", "due"].includes(field)) {
        return;
      }

      normalizeTaskDates(task);
      const originalValue = task[field] || TODAY;
      const input = document.createElement("input");
      input.type = "date";
      input.value = originalValue;
      input.className = "table-task-select";
      cell.textContent = "";
      cell.appendChild(input);
      input.focus();

      const commit = () => {
        if (!input.value) {
          cell.textContent = originalValue;
          return;
        }
        task[field] = input.value;
        task.updatedAt = TODAY;
        state.selectedMemberId = task.memberId;
        state.selectedTaskId = task.id;
        updateMemberSnapshot(task.memberId);
        saveState();
        render();
      };

      input.addEventListener("change", commit, { once: true });
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          commit();
        }
        if (event.key === "Escape") {
          event.preventDefault();
          cell.textContent = originalValue;
        }
      });
    }

    function ensureSelection() {
      const hasMember = state.members.some((member) => member.id === state.selectedMemberId);
      if (!hasMember) {
        state.selectedMemberId = state.members[0] ? state.members[0].id : null;
      }

      const validTasks = state.selectedMemberId ? getTasksByMember(state.selectedMemberId) : [];
      const hasTask = validTasks.some((task) => task.id === state.selectedTaskId);
      if (!hasTask) {
        state.selectedTaskId = validTasks[0] ? validTasks[0].id : null;
      }
    }

    function getVisibleTasks() {
      return sortTasks(state.tasks).filter((task) => {
        const statusMatched = state.activeFilter === "all" || task.status === state.activeFilter;
        const memberMatched = state.activeMemberFilter === "all" || task.memberId === state.activeMemberFilter;
        return statusMatched && memberMatched;
      });
    }

    function computeMemberProgress(memberId) {
      const tasks = getTasksByMember(memberId);
      if (!tasks.length) {
        return 0;
      }
      const total = tasks.reduce((sum, task) => sum + Number(task.progress || 0), 0);
      return Math.round(total / tasks.length);
    }

    function computeMemberStatus(memberId) {
      const tasks = getTasksByMember(memberId);
      if (!tasks.length) {
        return "todo";
      }
      if (tasks.some((task) => task.status === "delayed")) {
        return "delayed";
      }
      if (tasks.some((task) => task.status === "doing")) {
        return "doing";
      }
      if (tasks.every((task) => task.status === "done")) {
        return "done";
      }
      return "todo";
    }

    function updateMemberSnapshot(memberId, noteOverride, updateTime) {
      const member = getMemberById(memberId);
      if (!member) {
        return;
      }
      const tasks = getTasksByMember(memberId);
      const currentTask = tasks.find((task) => task.status === "doing") || tasks.find((task) => task.status === "todo") || tasks[0] || null;
      member.progress = computeMemberProgress(memberId);
      member.status = computeMemberStatus(memberId);
      member.focus = currentTask ? currentTask.title : "暂无任务";
      if (updateTime) {
        member.lastUpdate = inspectDate.value || TODAY;
      } else if (!member.lastUpdate) {
        member.lastUpdate = TODAY;
      }
      if (typeof noteOverride === "string" && noteOverride.trim()) {
        member.note = noteOverride.trim();
      } else if (!member.note) {
        member.note = tasks.length ? "已建立成员信息，可继续添加和检查任务。" : "尚未分配任务。";
      }
    }

      clearTimeout(taskClickTimer);
      taskClickTimer = setTimeout(() => {
        state.selectedMemberId = memberId;
        state.selectedTaskId = taskId;

        render();

    function renderReportBox() {
      reportTitle.textContent = state.reportTitle || "未生成报表";
      reportPreview.value = state.reportText || "";
    }

    function renderMemberDeleteOptions() {
      if (!state.members.length) {
        deleteMemberSelect.innerHTML = `<option value="">暂无员工</option>`;
        deleteMemberSelect.disabled = true;
        return;
      }

      deleteMemberSelect.disabled = false;
      deleteMemberSelect.innerHTML = state.members.map((member) => `
        <option value="${member.id}">${member.name}${member.role ? " · " + member.role : ""}</option>
      `).join("");

      if (state.selectedMemberId) {
        deleteMemberSelect.value = state.selectedMemberId;
      }

    function editMemberRole(memberId) {
      const member = getMemberById(memberId);
      if (!member) {
        showToast("没有找到这位员工");
        return;
      }

      const nextRole = window.prompt("修改 " + member.name + " 的职位", member.role || "");
      if (nextRole === null) {
        return;
      }

      member.role = nextRole.trim();
      state.selectedMemberId = member.id;
      updateMemberSnapshot(member.id);
      saveState();
      render();
      showToast("已更新员工职位");
    }

    function openInspectDialog(taskId) {
      const task = state.tasks.find((item) => item.id === taskId);
      if (!task) {
        showToast("没有找到这项任务");
        return;
      }

      const member = getMemberById(task.memberId);
      state.selectedMemberId = task.memberId;
      state.selectedTaskId = task.id;
      inspectDialogTaskInfo.textContent = (member ? member.name + " · " : "") + task.title;
      progressRange.value = task.progress || 0;
      progressValue.textContent = (task.progress || 0) + "%";
      inspectStatus.value = task.status || "todo";
      inspectDate.value = task.updatedAt || TODAY;
      inspectNote.value = task.checkNote || "";
      inspectDialogBackdrop.classList.remove("hidden");
    }

    function closeInspectDialog() {
      inspectDialogBackdrop.classList.add("hidden");
    }

    function updateActionButtons() {
      const hasMember = Boolean(getSelectedMember());
      const hasTask = Boolean(getSelectedTask());
      saveProgressButton.disabled = !hasMember || !hasTask;
      completeTaskButton.disabled = !hasMember || !hasTask;
      deleteTaskButton.disabled = !hasTask;
      deleteMemberButton.disabled = !state.members.length;
      exportDailyButton.disabled = !hasMember;
      exportWeeklyButton.disabled = !hasMember;
      copyReportButton.disabled = !state.reportText;
      downloadReportButton.disabled = !state.reportText;
      printBoardButton.disabled = !state.members.length;
    }

    function selectMember(memberId) {
      state.selectedMemberId = memberId;
      const tasks = getTasksByMember(memberId);
      state.selectedTaskId = tasks[0] ? tasks[0].id : null;
      saveState();
      render();
    }

    function addMember(event) {
      event.preventDefault();
      const formData = new FormData(memberForm);
      const name = String(formData.get("memberName") || "").trim();
      const role = String(formData.get("memberRole") || "").trim();
      const note = String(formData.get("memberNote") || "").trim();

      if (!name) {
        showToast("请先填写员工姓名");
        return;
      }

      const newMember = {
        id: "m" + Date.now(),
        name,
        role,
        note: note || "已建立成员信息，等待分配任务。",
        progress: 0,
        status: "todo",
        focus: "暂无任务",
        lastUpdate: TODAY
      };

      state.members.push(newMember);
      state.selectedMemberId = newMember.id;
      state.selectedTaskId = null;
      memberForm.reset();
      saveState();
      render();
      showToast("已新增员工：" + name);
    }

    function createTask({ memberId, title, start, due, priority = "medium", status = "todo" }) {
      if (!memberId || !title || !start || !due) {
        showToast("请完整填写任务信息");
        return null;
      }

      const newTask = {
        id: "t" + Date.now(),
        memberId,
        title,
        start,
        due,
        priority,
        status,
        progress: status === "done" ? 100 : status === "doing" ? 30 : 0,
        checkNote: "",
        updatedAt: TODAY
      };

      state.tasks.unshift(newTask);
      state.selectedMemberId = memberId;
      state.selectedTaskId = newTask.id;
      updateMemberSnapshot(memberId);
      saveState();
      render();
      showToast("已新增任务：" + title);
      return newTask;
    }

    function openTaskDialog(memberId) {
      const member = getMemberById(memberId);
      if (!member) {
        showToast("请先选择员工");
        return;
      }

      editingTaskId = null;
      dialogMemberId = memberId;
      taskDialogTitle.textContent = "新增任务";
      taskDialogAssignee.textContent = "分配给：" + member.name;
      dialogSubmitButton.textContent = "创建任务";
      dialogTaskForm.reset();
      document.getElementById("dialogStartDate").value = TODAY;
      document.getElementById("dialogDueDate").value = TODAY;
      document.getElementById("dialogPriority").value = "medium";
      document.getElementById("dialogTaskStatus").value = "todo";
      taskDialogBackdrop.classList.remove("hidden");
      setTimeout(() => document.getElementById("dialogTaskName").focus(), 0);
    }

    function openEditTaskDialog(taskId) {
      const task = state.tasks.find((item) => item.id === taskId);
      if (!task) {
        showToast("没有找到这项任务");
        return;
      }

      const member = getMemberById(task.memberId);
      editingTaskId = task.id;
      dialogMemberId = task.memberId;
      state.selectedMemberId = task.memberId;
      state.selectedTaskId = task.id;
      taskDialogTitle.textContent = "编辑任务";
      taskDialogAssignee.textContent = "正在编辑：" + (member ? member.name : "未分配");
      dialogSubmitButton.textContent = "保存修改";
      normalizeTaskDates(task);
      document.getElementById("dialogTaskName").value = task.title;
      document.getElementById("dialogStartDate").value = task.start || TODAY;
      document.getElementById("dialogDueDate").value = task.due || TODAY;
      document.getElementById("dialogPriority").value = task.priority || "medium";
      document.getElementById("dialogTaskStatus").value = task.status || "todo";
      taskDialogBackdrop.classList.remove("hidden");
      setTimeout(() => document.getElementById("dialogTaskName").focus(), 0);
    }

    function closeTaskDialog() {
      taskDialogBackdrop.classList.add("hidden");
      dialogMemberId = null;
      editingTaskId = null;
    }

    function addDialogTask(event) {
      event.preventDefault();
      const formData = new FormData(dialogTaskForm);
      const title = String(formData.get("taskName") || "").trim();
      const start = String(formData.get("startDate") || "");
      const due = String(formData.get("dueDate") || "");
      const priority = String(formData.get("priority") || "medium");
      const status = String(formData.get("taskStatus") || "todo");
      if (editingTaskId) {
        const task = state.tasks.find((item) => item.id === editingTaskId);
        if (!task) {
          showToast("没有找到这项任务");
          closeTaskDialog();
          return;
        }
        if (!title || !start || !due) {
          showToast("请完整填写任务信息");
          return;
        }

        task.title = title;
        task.start = start;
        task.due = due;
        task.priority = priority;
        task.status = status;
        if (task.status === "done") {
          task.progress = 100;
        } else if (task.status === "doing" && Number(task.progress || 0) === 0) {
          task.progress = 30;
        } else if (task.status === "todo" && task.progress === 100) {
          task.progress = 0;
        }
        task.updatedAt = TODAY;
        state.selectedMemberId = task.memberId;
        state.selectedTaskId = task.id;
        updateMemberSnapshot(task.memberId);
        saveState();
        render();
        closeTaskDialog();
        showToast("已保存任务修改");
        return;
      }

      const newTask = createTask({ memberId: dialogMemberId, title, start, due, priority, status });

      if (newTask) {
        closeTaskDialog();
      }
    }

    function saveProgress() {
      const member = getSelectedMember();
      const task = getSelectedTask();
      if (!member || !task) {
        showToast("请先选中员工和任务");
        return;
      }

      task.progress = Number(progressRange.value);
      task.status = inspectStatus.value;
      task.checkNote = inspectNote.value.trim();
      task.updatedAt = inspectDate.value || TODAY;

      if (task.progress === 100 && task.status !== "delayed") {
        task.status = "done";
        inspectStatus.value = "done";
      }
      if (task.status === "done" && task.progress < 100) {
        task.progress = 100;
        progressRange.value = 100;
        progressValue.textContent = "100%";
      }

      updateMemberSnapshot(member.id, inspectNote.value, true);
      saveState();
      render();
      closeInspectDialog();
      showToast("已保存检查结果");
    }

    function markTaskDone() {
      const task = getSelectedTask();
      if (!task) {
        showToast("请先选中任务");
        return;
      }
      task.progress = 100;
      task.status = "done";
      task.checkNote = inspectNote.value.trim() || "已完成";
      task.updatedAt = inspectDate.value || TODAY;
      progressRange.value = 100;
      progressValue.textContent = "100%";
      inspectStatus.value = "done";
      updateMemberSnapshot(task.memberId, task.checkNote, true);
      saveState();
      render();
      closeInspectDialog();
      showToast("任务已标记为完成");
    }

    function deleteCurrentTask() {
      const task = getSelectedTask();
      if (!task) {
        showToast("当前没有可删除的任务");
        return;
      }
      const memberId = task.memberId;
      state.tasks = state.tasks.filter((item) => item.id !== task.id);
      updateMemberSnapshot(memberId);
      ensureSelection();
      saveState();
      render();
      closeInspectDialog();
      showToast("当前任务已删除");
    }

    function deleteCurrentMember() {
      const memberId = deleteMemberSelect.value || state.selectedMemberId;
      const member = getMemberById(memberId);
      if (!member) {
        showToast("请选择要删除的员工");
        return;
      }
      state.members = state.members.filter((item) => item.id !== member.id);
      state.tasks = state.tasks.filter((task) => task.memberId !== member.id);
      ensureSelection();
      saveState();
      render();
      showToast("员工及其任务已删除");
    }

    function buildTaskLine(task) {
      return " - [" + statusMeta[task.status].label + "] " + task.title + " | 优先级：" +
        priorityMeta[task.priority].label + " | 进度：" + task.progress + "% | 截止：" + task.due;
    }

    function generateDailyReport() {
      const member = getSelectedMember();
      if (!member) {
        showToast("请先选中员工");
        return;
      }
      const tasks = getTasksByMember(member.id);
      const activeTasks = tasks.filter((task) => task.status !== "done");
      const doneTasks = tasks.filter((task) => task.status === "done");
      const lines = [
        "【员工日报】",
        "日期：" + TODAY,
        "姓名：" + member.name,
        "岗位：" + (member.role || "未填写"),
        "",
        "一、今日概况",
        " - 任务总数：" + tasks.length,
        " - 已完成：" + doneTasks.length,
        " - 进行中：" + formatStatusCount(tasks, "doing"),
        " - 待开始：" + formatStatusCount(tasks, "todo"),
        " - 已延期：" + formatStatusCount(tasks, "delayed"),
        "",
        "二、当前重点",
        " - " + (member.focus || "暂无重点任务"),
        "",
        "三、任务明细"
      ];

      if (tasks.length) {
        tasks.forEach((task) => lines.push(buildTaskLine(task)));
      } else {
        lines.push(" - 当前没有分配任务");
      }

      lines.push("");
      lines.push("四、明日计划");
      if (activeTasks.length) {
        activeTasks.slice(0, 5).forEach((task) => {
          lines.push(" - 继续推进：" + task.title + "（目标完成度：" + Math.min(task.progress + 20, 100) + "%）");
        });
      } else {
        lines.push(" - 当前任务已完成，可安排新工作");
      }

      lines.push("");
      lines.push("五、备注");
      lines.push(" - " + (member.note || "无"));

      state.reportTitle = member.name + " 日报";
      state.reportText = lines.join("\n");
      saveState();
      renderReportBox();
      updateActionButtons();
      showToast("已生成员工日报");
    }

    function generateWeeklyReport() {
      const member = getSelectedMember();
      if (!member) {
        showToast("请先选中员工");
        return;
      }
      const tasks = getTasksByMember(member.id);
      const thisWeekDone = tasks.filter((task) => task.status === "done");
      const nextWeekPlan = tasks.filter((task) => task.status !== "done");
      const overdueTasks = tasks.filter((task) => task.status === "delayed" || new Date(task.due) < new Date(TODAY));
      const lines = [
        "【员工周报】",
        "统计周期：" + getDateOffset(-6) + " 至 " + TODAY,
        "姓名：" + member.name,
        "岗位：" + (member.role || "未填写"),
        "",
        "一、本周完成情况",
        " - 本周任务总数：" + tasks.length,
        " - 已完成任务：" + thisWeekDone.length,
        " - 当前整体进度：" + (member.progress || 0) + "%",
        ""
      ];

      lines.push("二、本周完成事项");
      if (thisWeekDone.length) {
        thisWeekDone.forEach((task) => lines.push(buildTaskLine(task)));
      } else {
        lines.push(" - 本周暂无已完成任务");
      }

      lines.push("");
      lines.push("三、风险与问题");
      if (overdueTasks.length) {
        overdueTasks.forEach((task) => lines.push(" - 需关注：" + task.title + "，当前状态为" + statusMeta[task.status].label));
      } else {
        lines.push(" - 当前无明显延期风险");
      }

      lines.push("");
      lines.push("四、下周计划");
      if (nextWeekPlan.length) {
        nextWeekPlan.slice(0, 6).forEach((task) => lines.push(" - 计划推进：" + task.title + "，截止 " + task.due));
      } else {
        lines.push(" - 暂无待推进任务");
      }

      lines.push("");
      lines.push("五、备注");
      lines.push(" - " + (member.note || "无"));

      state.reportTitle = member.name + " 周报";
      state.reportText = lines.join("\n");
      saveState();
      renderReportBox();
      updateActionButtons();
      showToast("已生成员工周报");
    }

    async function copyReport() {
      if (!state.reportText) {
        showToast("请先生成报表");
        return;
      }
      try {
        await navigator.clipboard.writeText(reportPreview.value);
        state.reportText = reportPreview.value;
        saveState();
        showToast("报表内容已复制");
      } catch (error) {
        showToast("复制失败，请手动复制文本");
      }
    }

    function downloadReport() {
      const text = reportPreview.value.trim();
      if (!text) {
        showToast("请先生成报表");
        return;
      }
      state.reportText = reportPreview.value;
      saveState();
      const blob = new Blob([state.reportText], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      const title = (state.reportTitle || "员工报表").replace(/[\\/:*?\"<>|]/g, "-");
      link.href = URL.createObjectURL(blob);
      link.download = title + ".txt";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
      showToast("报表已下载");
    }

    function exportDataBackup() {
      const data = buildPersistedState();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
      const link = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, "");
      link.href = URL.createObjectURL(blob);
      link.download = "日常作业管理数据备份-" + stamp + ".json";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
      showToast("数据备份已导出");
    }

    function importDataBackup(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || "{}"));
          if (!Array.isArray(parsed.members) || !Array.isArray(parsed.tasks)) {
            showToast("备份文件格式不正确");
            return;
          }

          state.activeFilter = typeof parsed.activeFilter === "string" ? parsed.activeFilter : "all";
          state.activeMemberFilter = typeof parsed.activeMemberFilter === "string" ? parsed.activeMemberFilter : "all";
          state.memberColumns = ["1", "2", "3", "4"].includes(String(parsed.memberColumns)) ? String(parsed.memberColumns) : "3";
          state.selectedMemberId = parsed.selectedMemberId || (parsed.members[0] && parsed.members[0].id) || null;
          state.selectedTaskId = parsed.selectedTaskId || null;
          state.reportTitle = typeof parsed.reportTitle === "string" ? parsed.reportTitle : "";
          state.reportText = typeof parsed.reportText === "string" ? parsed.reportText : "";
          state.members = parsed.members;
          state.tasks = parsed.tasks;
          ensureSelection();
          saveState();
          render();
          showToast("数据已恢复");
        } catch (error) {
          showToast("导入失败，请选择正确的备份文件");
        } finally {
          importDataInput.value = "";
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function buildPrintHtml() {
      const summary = {
        members: state.members.length,
        total: state.tasks.length,
        done: formatStatusCount(state.tasks, "done"),
        doing: formatStatusCount(state.tasks, "doing"),
        todo: formatStatusCount(state.tasks, "todo"),
        delayed: formatStatusCount(state.tasks, "delayed")
      };

      const memberBlocks = state.members.map((member) => {
        const tasks = getTasksByMember(member.id);
        return `
          <section class="member-block">
            <div class="member-header">
              <div>
                <h2>${member.name}</h2>
                <p>${member.role || "未填写岗位"} ｜ 整体进度 ${member.progress || 0}% ｜ 当前状态 ${statusMeta[member.status].label}</p>
              </div>
              <div class="member-tag">${member.focus || "暂无任务"}</div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>任务名称</th>
                  <th>优先级</th>
                  <th>截止日期</th>
                  <th>进度</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody>
                ${tasks.length ? tasks.map((task) => `
                  <tr>
                    <td>${task.title}</td>
                    <td>${priorityMeta[task.priority].label}</td>
                    <td>${task.due}</td>
                    <td>${task.progress}%</td>
                    <td>${statusMeta[task.status].label}</td>
                  </tr>
                `).join("") : `
                  <tr>
                    <td colspan="5">暂无任务</td>
                  </tr>
                `}
              </tbody>
            </table>
          </section>
        `;
      }).join("");

      return `
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
          <meta charset="UTF-8">
          <title>团队完成情况打印页</title>
          <style>
            body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; color: #1f2a3d; margin: 28px; }
            h1 { margin: 0 0 8px; font-size: 28px; }
            p { margin: 0; color: #6b758b; }
            .summary { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin: 22px 0; }
            .card { border: 1px solid #d8deeb; border-radius: 14px; padding: 14px; background: #f8faff; }
            .card strong { display: block; margin-bottom: 6px; font-size: 24px; }
            .member-block { margin-top: 26px; page-break-inside: avoid; }
            .member-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
            .member-header h2 { margin: 0 0 4px; font-size: 20px; }
            .member-tag { padding: 8px 12px; border-radius: 999px; background: #eef3ff; color: #3155ee; font-size: 12px; }
            table { width: 100%; border-collapse: collapse; }
            th, td { padding: 10px 8px; border: 1px solid #dfe5f1; text-align: left; font-size: 13px; }
            th { background: #f2f5fb; }
            @media print {
              body { margin: 16px; }
            }
          </style>
        </head>
        <body>
          <h1>团队完成情况打印页</h1>
          <p>打印日期：${TODAY}</p>
          <section class="summary">
            <div class="card"><strong>${summary.members}</strong><span>员工人数</span></div>
            <div class="card"><strong>${summary.total}</strong><span>任务总数</span></div>
            <div class="card"><strong>${summary.done}</strong><span>已完成</span></div>
            <div class="card"><strong>${summary.doing}</strong><span>进行中</span></div>
            <div class="card"><strong>${summary.todo}</strong><span>待开始</span></div>
            <div class="card"><strong>${summary.delayed}</strong><span>已延期</span></div>
          </section>
          ${memberBlocks || "<p>当前没有员工和任务数据。</p>"}
        </body>
        </html>
      `;
    }

    function printBoard() {
      if (!state.members.length) {
        showToast("请先新增员工和任务");
        return;
      }
      const printWindow = window.open("", "_blank", "width=1200,height=900");
      if (!printWindow) {
        showToast("打印窗口被浏览器拦截了");
        return;
      }
      printWindow.document.open();
      printWindow.document.write(buildPrintHtml());
      printWindow.document.close();
      printWindow.focus();
      setTimeout(() => {
        printWindow.print();
      }, 300);
    }

    function togglePanel(forceOpen) {
      const shouldCollapse = typeof forceOpen === "boolean"
        ? !forceOpen
        : !shell.classList.contains("panel-collapsed");
      shell.classList.toggle("panel-collapsed", shouldCollapse);
    }

    function reorganizeDashboard() {
      const insightGrid = document.querySelector(".insight-grid");
      const sidePanel = document.getElementById("sidePanel");
      const profileCard = document.getElementById("profileCard");
      const statsPanel = document.getElementById("statsGrid")?.closest(".panel");
      const memberPanel = document.getElementById("memberForm")?.closest(".panel");

      if (!insightGrid || !sidePanel || !profileCard || !statsPanel || !memberPanel) {
        return;
      }

      const statsHeader = statsPanel.querySelector("h3");
      const statsSubtitle = statsPanel.querySelector(".panel-subtitle");

      if (statsHeader) statsHeader.textContent = "团队概况";
      if (statsSubtitle) statsSubtitle.textContent = "快速掌握任务状态分布。";

      profileCard.insertAdjacentElement("afterend", statsPanel);
      if (!insightGrid.children.length) {
        insightGrid.remove();
      }
    }

    function bindEvents() {
      memberForm.addEventListener("submit", addMember);
      memberColumnSelect.addEventListener("change", () => {
        state.memberColumns = memberColumnSelect.value;
        saveState();
        renderMembers();
      });
      dialogTaskForm.addEventListener("submit", addDialogTask);
      closeTaskDialogButton.addEventListener("click", closeTaskDialog);
      taskDialogBackdrop.addEventListener("click", (event) => {
        if (event.target === taskDialogBackdrop) {
          closeTaskDialog();
        }
      });
      closeInspectDialogButton.addEventListener("click", closeInspectDialog);
      inspectDialogBackdrop.addEventListener("click", (event) => {
        if (event.target === inspectDialogBackdrop) {
          closeInspectDialog();
        }
      });
      progressRange.addEventListener("input", () => {
        progressValue.textContent = progressRange.value + "%";
      });
      inspectStatus.addEventListener("change", () => {
        if (inspectStatus.value === "done") {
          progressRange.value = 100;
          progressValue.textContent = "100%";
        }
      });
      saveProgressButton.addEventListener("click", saveProgress);
      completeTaskButton.addEventListener("click", markTaskDone);
      deleteTaskButton.addEventListener("click", deleteCurrentTask);
      deleteMemberButton.addEventListener("click", deleteCurrentMember);
      togglePanelButton.addEventListener("click", () => togglePanel(false));
      openPanelButton.addEventListener("click", () => togglePanel(true));
      exportDataButton.addEventListener("click", exportDataBackup);
      importDataButton.addEventListener("click", () => importDataInput.click());
      importDataInput.addEventListener("change", importDataBackup);
      exportDailyButton.addEventListener("click", generateDailyReport);
      exportWeeklyButton.addEventListener("click", generateWeeklyReport);
      copyReportButton.addEventListener("click", copyReport);
      downloadReportButton.addEventListener("click", downloadReport);
      printBoardButton.addEventListener("click", printBoard);
      reportPreview.addEventListener("input", () => {
        state.reportText = reportPreview.value;
        saveState();
        updateActionButtons();
      });
    }

    function render() {
      ensureSelection();
      state.members.forEach((member) => updateMemberSnapshot(member.id));
      tableCaption.textContent = "";
      renderStatsGrid();
      renderMembers();
      renderFilters();
      renderTaskTable();
      renderProfileCard();
      renderReportBox();
      renderMemberDeleteOptions();
      updateActionButtons();
      saveState();
    }

    reorganizeDashboard();
    bindEvents();
    render();
  </script>
</body>
</html>
